services:
  runner:
    build: .
    volumes:
      - ./data:/app/data
    restart: always
    command: python -m app.runtime.runner

  ui:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    restart: always
    command: streamlit run app/ui/main.py --server.port=8501 --server.address=0.0.0.0

volumes:
  data:
